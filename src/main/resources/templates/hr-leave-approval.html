<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: eacHead('HR — Review leave request')}"></th:block>
</head>
<body class="eac-surface min-vh-100">

<div class="dashboard-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar(activePage='leaves')}"></div>

    <div id="content" class="main-content">
        <div class="d-flex align-items-center mb-4 flex-wrap gap-2">
            <button id="sidebarToggle" class="btn-hamburger">☰</button>
            <div class="flex-grow-1">
                <h2 class="text-danger fw-bold m-0">Review leave request</h2>
                <p class="text-muted small mb-0" th:if="${leaveEmployee != null}"
                   th:text="${'Employee: ' + leaveEmployee.firstName + ' ' + leaveEmployee.lastName + ' — ' + leaveEmployee.customEmployeeId}"></p>
            </div>
            <a th:href="@{/hr/leaves}" class="btn btn-sm btn-outline-secondary fw-bold">Back to queue</a>
        </div>

        <div class="card shadow-sm border-0 p-4" style="max-width: 720px;">
            <div class="mb-3">
                <span class="badge bg-warning text-dark text-uppercase">Pending</span>
                <span class="ms-2 fw-bold" th:text="${req.leaveType}"></span>
            </div>
            <div class="row g-2 mb-2 small">
                <div class="col-6 text-muted">Request ID</div>
                <div class="col-6 fw-bold" th:text="'REQ-' + ${#numbers.formatInteger(req.id, 4)}"></div>
                <div class="col-6 text-muted">Start</div>
                <div class="col-6 fw-bold" th:text="${req.startDate}"></div>
                <div class="col-6 text-muted">End</div>
                <div class="col-6 fw-bold" th:text="${req.endDate}"></div>
            </div>
            <div class="mb-4">
                <div class="text-muted small text-uppercase fw-bold mb-1">Reason / details (from employee)</div>
                <div class="p-3 bg-light rounded border" style="white-space: pre-wrap; min-height: 80px;"
                     th:text="${req.reason != null and !#strings.isEmpty(req.reason) ? req.reason : '—'}"></div>
            </div>

            <div class="d-flex gap-2 flex-wrap">
                <form th:action="@{/hr/leaves/approve}" method="post" class="d-inline">
                    <input type="hidden" name="id" th:value="${req.id}">
                    <button type="submit" class="btn btn-success fw-bold" onclick="return confirm('Approve this leave and deduct balances as applicable?');">Approve</button>
                </form>
                <form th:action="@{/hr/leaves/reject}" method="post" class="d-inline">
                    <input type="hidden" name="id" th:value="${req.id}">
                    <button type="submit" class="btn btn-danger fw-bold" onclick="return confirm('Reject this leave request?');">Reject</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click', function () {
        document.getElementById('sidebar').classList.toggle('hidden');
        document.getElementById('content').classList.toggle('expanded');
    });
</script>
</body>
</html>
