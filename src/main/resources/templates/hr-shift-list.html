<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: eacHead('HR — Shift list')}"></th:block>
</head>
<body class="eac-surface min-vh-100">
<div class="dashboard-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar(activePage='shiftList')}"></div>
    <div id="content" class="main-content eac-empl-page">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <div class="d-flex align-items-center gap-3">
                <button type="button" id="sidebarToggle" class="btn-hamburger">☰</button>
                <div>
                    <h1 class="h4 fw-bold m-0" style="color:#1a2e2c;">Shift List</h1>
                    <div class="small text-muted">Shift &amp; Schedule</div>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-sm text-white border-0 fw-bold px-3" data-bs-toggle="modal" data-bs-target="#addShiftModal" style="background:#0d6e6a;">Add Shift</button>
                <a th:href="@{/hr/shift-management}" class="btn btn-sm btn-outline-secondary fw-bold px-3">Shift Management</a>
            </div>
        </div>

        <div class="alert alert-success py-2" th:if="${okMessage != null}" th:text="${okMessage}">Saved.</div>

        <div class="bg-white border rounded shadow-sm">
            <div class="d-flex justify-content-between align-items-center px-3 py-2 text-white" style="background:#0d4a47;border-radius:6px 6px 0 0;">
                <strong>Shift List</strong>
                <div style="min-width:220px;">
                    <select class="form-select form-select-sm" id="shiftBranchFilter">
                        <option value="">All Branches</option>
                        <option value="ALL">All Branches</option>
                        <option th:each="s : ${shifts}" th:if="${s.branchCode != null and !#strings.isEmpty(s.branchCode) and s.branchCode != 'ALL'}"
                                th:value="${s.branchCode}" th:text="${s.branchCode}">Branch</option>
                    </select>
                </div>
            </div>
            <div class="d-flex justify-content-between align-items-center px-3 py-2 border-bottom">
                <div class="small text-muted">Row Per Page <strong>10</strong> Entries</div>
                <div style="max-width:220px;">
                    <input type="search" id="shiftSearch" class="form-control form-control-sm" placeholder="Search">
                </div>
            </div>
            <div class="table-responsive">
            <table class="table table-sm table-hover mb-0" id="shiftTable">
                <thead class="table-light small text-uppercase">
                <tr>
                    <th style="width:2rem;"></th>
                    <th>Shift Name</th>
                    <th>Branch</th>
                    <th>Start Time</th>
                    <th>End Time</th>
                    <th>Break Minutes</th>
                    <th>Created By</th>
                    <th>Edited By</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${shifts}" th:attr="data-branch=${s.branchCode},data-search=${#strings.toLowerCase((s.name != null ? s.name : '') + ' ' + (s.branchCode != null ? s.branchCode : ''))}">
                    <td><input type="checkbox" class="form-check-input" disabled></td>
                    <td th:text="${s.name != null ? s.name : '—'}">Shift</td>
                    <td th:text="${(s.branchCode == null or s.branchCode == 'ALL') ? 'All Branches' : s.branchCode}">All Branches</td>
                    <td th:text="${s.startTime != null ? s.startTime : '—'}">—</td>
                    <td th:text="${s.endTime != null ? s.endTime : '—'}">—</td>
                    <td th:text="${s.breakMinutes != null ? s.breakMinutes : 0}">0</td>
                    <td th:text="${s.createdBy != null ? s.createdBy : 'system'}">system</td>
                    <td th:text="${s.updatedBy != null ? s.updatedBy : 'system'}">system</td>
                    <td>
                        <div class="d-flex gap-1">
                            <a class="btn btn-sm btn-outline-secondary py-0 disabled" href="#" tabindex="-1" aria-disabled="true">👁</a>
                            <a class="btn btn-sm btn-outline-secondary py-0 disabled" href="#" tabindex="-1" aria-disabled="true">✎</a>
                            <form method="post" th:action="@{/hr/shifts/archive}" th:if="${s.active}">
                                <input type="hidden" name="id" th:value="${s.id}">
                                <button class="btn btn-sm btn-outline-danger py-0" type="submit" onclick="return confirm('Archive this shift?');">🗑</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(shifts)}"><td colspan="9" class="text-center text-muted p-3">No shifts yet.</td></tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="addShiftModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <form method="post" th:action="@{/hr/shifts/save}" class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Create Shift Schedule</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3">
                    <input type="hidden" name="id">
                    <div class="col-md-6">
                        <label class="form-label small">Shift Name *</label>
                        <input required class="form-control form-control-sm" name="name" placeholder="e.g. Morning Shift">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small">Branch *</label>
                        <input class="form-control form-control-sm" name="branchCode" placeholder="ALL">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small">Start Time *</label>
                        <input type="time" required class="form-control form-control-sm" name="startTime">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small">End Time *</label>
                        <input type="time" required class="form-control form-control-sm" name="endTime">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small">Maximum Allowed Hours *</label>
                        <input type="number" step="0.25" min="0" required class="form-control form-control-sm" name="maxAllowedHours" placeholder="e.g. 8">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small">Grace Period (minutes) *</label>
                        <input type="number" min="0" required class="form-control form-control-sm" name="graceMinutes" placeholder="e.g. 5">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small">Break Duration (minutes)</label>
                        <input type="number" min="0" class="form-control form-control-sm" name="breakMinutes" placeholder="e.g. 60">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small">Allowed Minutes Before Clock In</label>
                        <input type="number" min="0" class="form-control form-control-sm" name="allowedMinutesBeforeClockIn" placeholder="e.g. 15">
                        <div class="form-text">Leave blank if no time restriction applies.</div>
                    </div>
                    <div class="col-12 d-flex gap-4 small">
                        <label><input type="checkbox" name="flexibleHours"> Flexible Hours</label>
                        <label><input type="checkbox" name="allowExtraHours"> Allow Extra Hours</label>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small">Flexi In Window Start</label>
                        <input type="time" class="form-control form-control-sm" name="flexiInWindowStart">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small">Flexi In Window End</label>
                        <input type="time" class="form-control form-control-sm" name="flexiInWindowEnd">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small">Required Net Work Minutes</label>
                        <input type="number" min="0" class="form-control form-control-sm" name="requiredNetWorkMinutes" placeholder="e.g. 480">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small">OT Approval Requirement</label>
                        <select class="form-select form-select-sm" name="requireOtApproval">
                            <option value="" selected>Default (No)</option>
                            <option value="true">Require approval</option>
                            <option value="false">No approval required</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small">Missing Punch Policy</label>
                        <select class="form-select form-select-sm" name="missingPunchPolicy">
                            <option value="REVIEW_REQUIRED" selected>Review Required</option>
                            <option value="AUTO_CLOSE">Auto Close</option>
                            <option value="IGNORE">Ignore</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="applyStrictNoGraceOt60" id="applyStrictNoGraceOt60">
                            <label class="form-check-label small" for="applyStrictNoGraceOt60">
                                Quick policy preset: No grace period + Minimum OT minutes = 60
                            </label>
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label small">Notes</label>
                        <textarea class="form-control form-control-sm" name="notes" rows="3" placeholder="Optional notes..."></textarea>
                    </div>
                    <input type="hidden" name="active" value="true">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-sm btn-light border" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" class="btn btn-sm text-white border-0 fw-bold" style="background:#0d6e6a;">Save Shift</button>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click', function () {
        document.getElementById('sidebar').classList.toggle('hidden');
        document.getElementById('content').classList.toggle('expanded');
    });
    (function () {
        const table = document.getElementById('shiftTable');
        const q = document.getElementById('shiftSearch');
        const b = document.getElementById('shiftBranchFilter');
        if (!table) return;
        const rows = () => Array.prototype.slice.call(table.querySelectorAll('tbody tr')).filter(r => r.querySelectorAll('td').length > 1);
        function apply() {
            const qq = (q && q.value ? q.value.trim().toLowerCase() : '');
            const bb = (b && b.value ? b.value : '');
            rows().forEach(function (r) {
                const branch = r.getAttribute('data-branch') || '';
                const search = r.getAttribute('data-search') || '';
                const byBranch = !bb || bb === branch;
                const bySearch = !qq || search.indexOf(qq) >= 0;
                r.classList.toggle('d-none', !(byBranch && bySearch));
            });
        }
        if (q) q.addEventListener('input', apply);
        if (b) b.addEventListener('change', apply);
    })();
</script>
</body>
</html>
