<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/head :: eacHead('HR — Teaching pay — Form')}"></th:block>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="eac-surface min-vh-100">
<div class="dashboard-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar(activePage='teachingPay')}"></div>
    <div id="content" class="main-content p-3 p-md-4" style="max-width: 960px;">
        <div class="d-flex align-items-center gap-2 mb-3">
            <button type="button" id="sidebarToggle" class="btn-hamburger">☰</button>
            <h1 class="h4 fw-bold m-0" style="color: #1a2e2c;" th:text="${isEdit} ? 'Edit teaching pay' : 'New teaching pay'">Teaching pay</h1>
        </div>
        <p class="text-muted small mb-3">
            <a th:href="@{/hr/teaching-pay}">← Back to list</a>
        </p>

        <form th:unless="${isEdit}" th:action="@{/hr/teaching-pay}" th:object="${teachingPay}" method="post" class="card border-0 shadow-sm p-3 p-md-4" novalidate>
            <div th:replace="~{fragments/hr-teaching-pay-fields :: fields}"></div>
        </form>

        <form th:if="${isEdit}" th:action="@{/hr/teaching-pay/update}" th:object="${teachingPay}" method="post" class="card border-0 shadow-sm p-3 p-md-4" novalidate>
            <input type="hidden" th:field="*{id}"/>
            <div th:replace="~{fragments/hr-teaching-pay-fields :: fields}"></div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click', function () {
        document.getElementById('sidebar').classList.toggle('hidden');
        document.getElementById('content').classList.toggle('expanded');
    });
</script>
</body>
</html>
