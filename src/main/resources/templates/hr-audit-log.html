<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/head :: eacHead('EAC — HR audit log')}"></th:block>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="eac-surface min-vh-100">
<div class="dashboard-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar(activePage='auditLog')}"></div>

    <div id="content" class="main-content eac-empl-page" style="background:#f5f7f7;">

        <!-- Page header -->
        <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
            <div class="d-flex align-items-start gap-2">
                <button type="button" id="sidebarToggle" class="btn-hamburger me-0 mt-1">☰</button>
                <div>
                    <h1 class="h4 fw-bold m-0" style="color:#1a2e2c;letter-spacing:-0.5px;">HR Audit Log</h1>
                    <nav class="eac-empl-breadcrumb mt-1" aria-label="Breadcrumb">
                        <a th:href="@{/hr/dashboard}">Home</a><span class="sep">/</span>
                        <span>Audit Log</span>
                    </nav>
                </div>
            </div>
        </div>

        <!-- Table card -->
        <div class="card border-0 shadow-sm">

            <!-- Toolbar -->
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 px-4 pt-3 pb-2 border-bottom" style="background:#fff;">
                <div class="d-flex align-items-center gap-3 flex-wrap">
                    <div class="d-flex align-items-center gap-2">
                        <i class="fas fa-clipboard-list text-muted" style="font-size:.8rem;"></i>
                        <span class="fw-semibold text-uppercase text-muted" style="font-size:.7rem;letter-spacing:.07em;">Activity</span>
                        <span id="visibleCount" class="badge rounded-pill ms-1"
                              style="font-size:.65rem;background:#e9ecef;color:#495057;">— events</span>
                    </div>
                    <!-- Category filter pills -->
                    <div class="d-flex flex-wrap gap-1" id="categoryFilters">
                        <button type="button" data-cat="all"
                                class="btn btn-sm rounded-pill px-3"
                                style="font-size:.72rem;background:#1a2e2c;color:#fff;border:none;">All</button>
                        <button type="button" data-cat="employee"
                                class="btn btn-sm rounded-pill px-3"
                                style="font-size:.72rem;background:#e8f0fe;color:#1a56db;border:1px solid #c3d3fd;">
                            <i class="fas fa-user-edit me-1" style="font-size:.6rem;"></i>Employee
                        </button>
                        <button type="button" data-cat="leave"
                                class="btn btn-sm rounded-pill px-3"
                                style="font-size:.72rem;background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9;">
                            <i class="fas fa-calendar-check me-1" style="font-size:.6rem;"></i>Leave
                        </button>
                        <button type="button" data-cat="records"
                                class="btn btn-sm rounded-pill px-3"
                                style="font-size:.72rem;background:#f3e8ff;color:#7e22ce;border:1px solid #e9d5ff;">
                            <i class="fas fa-id-badge me-1" style="font-size:.6rem;"></i>Records
                        </button>
                    </div>
                </div>
                <!-- Search -->
                <div class="input-group input-group-sm" style="max-width:230px;">
                    <span class="input-group-text bg-white border-end-0 pe-1">
                        <i class="fas fa-search text-muted" style="font-size:.7rem;"></i>
                    </span>
                    <input type="search" id="auditSearch" class="form-control border-start-0 ps-1"
                           placeholder="Search actor, action, detail…" style="font-size:.8rem;">
                </div>
            </div>

            <!-- Table -->
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="auditTable" style="font-size:.85rem;">
                    <thead>
                    <tr style="background:#f8f9fb;font-size:.65rem;letter-spacing:.06em;color:#6c757d;text-transform:uppercase;border-bottom:1px solid #e9ecef;">
                        <th class="ps-4 py-3 fw-semibold" style="min-width:160px;">When</th>
                        <th class="py-3 fw-semibold" style="width:100px;">Actor</th>
                        <th class="py-3 fw-semibold" style="width:180px;">Action</th>
                        <th class="py-3 fw-semibold" style="width:140px;">Entity</th>
                        <th class="pe-4 py-3 fw-semibold">Detail</th>
                    </tr>
                    </thead>
                    <tbody id="auditTableBody">
                    <tr th:each="e : ${events}"
                        th:attr="data-ts=${e.createdAt},
                                 data-actor=${e.actorUsername},
                                 data-action=${e.action},
                                 data-entity=${e.entityType},
                                 data-entityid=${e.entityId},
                                 data-detail=${e.detail},
                                 data-cat=${e.action != null and (#strings.startsWith(e.action,'LEAVE_')) ? 'leave' :
                                            (e.action != null and (#strings.startsWith(e.action,'UPDATE_201') or #strings.startsWith(e.action,'UPDATE_EMPLOYEE_201') or e.action == 'UPDATE_201_RECORDS')) ? 'records' :
                                            'employee'}"
                        style="border-bottom:1px solid #f1f3f5;">
                        <td class="ps-4 py-3">
                            <div class="fw-semibold" style="color:#1a2e2c;font-size:.82rem;" data-fmt-ts th:attr="data-raw=${e.createdAt}" th:text="${e.createdAt}">—</div>
                            <div class="text-muted" style="font-size:.72rem;" data-rel-ts th:attr="data-raw=${e.createdAt}"></div>
                        </td>
                        <td class="py-3">
                            <div class="d-flex align-items-center gap-2">
                                <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                                     style="width:26px;height:26px;background:#f0f1f3;font-size:.65rem;font-weight:600;color:#495057;"
                                     data-actor-initials th:attr="data-name=${e.actorUsername}"></div>
                                <span style="font-size:.8rem;" th:text="${e.actorUsername != null ? e.actorUsername : 'system'}">—</span>
                            </div>
                        </td>
                        <td class="py-3">
                            <span data-action-badge th:attr="data-action=${e.action}"
                                  class="badge rounded-pill px-2 py-1"
                                  style="font-size:.68rem;font-weight:500;"
                                  th:text="${e.action}">—</span>
                        </td>
                        <td class="py-3">
                            <div style="font-size:.8rem;">
                                <span class="text-muted" th:text="${e.entityType}">—</span>
                                <a th:if="${e.entityType == 'OfficialEmployee' and e.entityId != null}"
                                   th:href="@{/hr/employees/{id}(id=${e.entityId})}"
                                   class="ms-1 fw-semibold text-decoration-none"
                                   style="color:#A30000;font-size:.78rem;"
                                   th:text="'#' + ${e.entityId}">—</a>
                                <span th:unless="${e.entityType == 'OfficialEmployee' and e.entityId != null}"
                                      class="ms-1 text-muted" style="font-size:.78rem;"
                                      th:text="${e.entityId != null ? '#' + e.entityId : ''}">—</span>
                            </div>
                        </td>
                        <td class="pe-4 py-3">
                            <div data-detail-fmt th:attr="data-raw=${e.detail}"
                                 style="font-size:.8rem;color:#374151;max-width:26rem;"></div>
                        </td>
                    </tr>
                    <tr th:if="${events == null or events.isEmpty()}">
                        <td colspan="5" class="text-center text-muted py-5">
                            <i class="fas fa-clipboard-list d-block mx-auto mb-2" style="font-size:2rem;opacity:.2;"></i>
                            <div style="font-size:.85rem;">No audit events recorded yet.</div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination footer -->
            <div class="d-flex justify-content-between align-items-center px-4 py-2 border-top" style="background:#fff;">
                <div class="text-muted" id="pageInfo" style="font-size:.75rem;"></div>
                <div class="d-flex gap-1">
                    <button id="prevPage" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size:.75rem;" disabled>
                        <i class="fas fa-chevron-left" style="font-size:.65rem;"></i>
                    </button>
                    <button id="nextPage" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size:.75rem;" disabled>
                        <i class="fas fa-chevron-right" style="font-size:.65rem;"></i>
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('sidebarToggle').addEventListener('click', function () {
    document.getElementById('sidebar').classList.toggle('hidden');
    document.getElementById('content').classList.toggle('expanded');
});

(function () {
    /* ── Timestamp formatting ── */
    function fmtDate(isoStr) {
        if (!isoStr) return '—';
        try {
            var d = new Date(isoStr);
            return d.toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' })
                 + ' · '
                 + d.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit', hour12: false });
        } catch (e) { return isoStr; }
    }
    function relTime(isoStr) {
        if (!isoStr) return '';
        try {
            var diff = Date.now() - new Date(isoStr).getTime();
            var mins = Math.floor(diff / 60000);
            if (mins < 1)  return 'just now';
            if (mins < 60) return mins + ' min ago';
            var hrs = Math.floor(mins / 60);
            if (hrs < 24)  return hrs + ' hr ago';
            var days = Math.floor(hrs / 24);
            if (days < 7)  return days + ' day' + (days > 1 ? 's' : '') + ' ago';
            return Math.floor(days / 7) + ' wk ago';
        } catch (e) { return ''; }
    }
    document.querySelectorAll('[data-fmt-ts]').forEach(function (el) {
        el.textContent = fmtDate(el.getAttribute('data-raw'));
    });
    document.querySelectorAll('[data-rel-ts]').forEach(function (el) {
        el.textContent = relTime(el.getAttribute('data-raw'));
    });

    /* ── Actor initials avatar ── */
    document.querySelectorAll('[data-actor-initials]').forEach(function (el) {
        var name = el.getAttribute('data-name') || '?';
        el.textContent = name.substring(0, 2).toUpperCase();
    });

    /* ── Action badge colors ── */
    var badgeStyles = {
        'LEAVE_APPROVED':       'background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9;',
        'LEAVE_REJECTED':       'background:#fce4ec;color:#b71c1c;border:1px solid #f8bbd0;',
        'UPDATE_EMPLOYEE':      'background:#e8f0fe;color:#1a56db;border:1px solid #c3d3fd;',
        'UPDATE_EMPLOYEE_INFO': 'background:#e8f0fe;color:#1a56db;border:1px solid #c3d3fd;',
        'UPDATE_EMPLOYEE_EAC':  'background:#e8f0fe;color:#1a56db;border:1px solid #c3d3fd;',
        'UPDATE_EMPLOYEE_201':  'background:#f3e8ff;color:#7e22ce;border:1px solid #e9d5ff;',
        'UPDATE_201_RECORDS':   'background:#f3e8ff;color:#7e22ce;border:1px solid #e9d5ff;',
        'ARCHIVE':              'background:#fff3e0;color:#e65100;border:1px solid #ffe0b2;',
        'DELETE':               'background:#fce4ec;color:#b71c1c;border:1px solid #f8bbd0;',
    };
    var defaultBadge = 'background:#f0f1f3;color:#495057;border:1px solid #dee2e6;';
    document.querySelectorAll('[data-action-badge]').forEach(function (el) {
        var action = el.getAttribute('data-action') || '';
        var style = null;
        Object.keys(badgeStyles).forEach(function (k) {
            if (!style && action.indexOf(k) === 0) style = badgeStyles[k];
        });
        el.setAttribute('style', 'font-size:.68rem;font-weight:500;' + (style || defaultBadge));
        /* Humanise label */
        el.textContent = action.replace(/_/g, ' ').toLowerCase().replace(/\b\w/g, function (c) { return c.toUpperCase(); });
    });

    /* ── Detail formatting ── */
    function fmtDetail(raw) {
        if (!raw) return '<span class="text-muted">—</span>';
        /* key=value pairs → pill list */
        if (/\w+=/.test(raw)) {
            var parts = raw.split(/\s+(?=\w+=)/);
            if (parts.length > 1) {
                return parts.map(function (p) {
                    var eq = p.indexOf('=');
                    if (eq < 0) return '<span class="text-muted">' + p + '</span>';
                    var k = p.substring(0, eq);
                    var v = p.substring(eq + 1);
                    return '<span class="me-2"><span class="text-muted" style="font-size:.72rem;">' + k + '</span> '
                         + '<span class="fw-semibold" style="color:#1a2e2c;">' + v + '</span></span>';
                }).join('');
            }
        }
        return '<span style="color:#374151;">' + raw + '</span>';
    }
    document.querySelectorAll('[data-detail-fmt]').forEach(function (el) {
        el.innerHTML = fmtDetail(el.getAttribute('data-raw'));
    });

    /* ── Filter + search ── */
    var allRows = Array.prototype.slice.call(
        document.querySelectorAll('#auditTableBody tr[data-action]')
    );
    var currentCat = 'all';
    var currentSearch = '';

    document.querySelectorAll('#categoryFilters [data-cat]').forEach(function (btn) {
        btn.addEventListener('click', function () {
            currentCat = btn.getAttribute('data-cat');
            document.querySelectorAll('#categoryFilters [data-cat]').forEach(function (b) {
                b.style.background = '';
                b.style.color = '';
                b.style.border = '';
                b.style.fontWeight = '';
            });
            btn.style.fontWeight = '600';
            currentPage = 1;
            applyFilters();
        });
    });

    var searchEl = document.getElementById('auditSearch');
    if (searchEl) searchEl.addEventListener('input', function () {
        currentSearch = searchEl.value.trim().toLowerCase();
        currentPage = 1;
        applyFilters();
    });

    /* ── Pagination ── */
    var PAGE_SIZE = 25;
    var currentPage = 1;
    var visibleRows = [];

    function applyFilters() {
        visibleRows = allRows.filter(function (r) {
            var cat  = r.getAttribute('data-cat') || '';
            var text = ((r.getAttribute('data-actor') || '') + ' '
                      + (r.getAttribute('data-action') || '') + ' '
                      + (r.getAttribute('data-detail') || '') + ' '
                      + (r.getAttribute('data-entity') || '')).toLowerCase();
            var catOk    = currentCat === 'all' || cat === currentCat;
            var searchOk = !currentSearch || text.indexOf(currentSearch) >= 0;
            return catOk && searchOk;
        });
        renderPage();
    }

    function renderPage() {
        var total = visibleRows.length;
        var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
        currentPage = Math.min(currentPage, totalPages);
        var start = (currentPage - 1) * PAGE_SIZE;
        var end   = Math.min(start + PAGE_SIZE, total);

        allRows.forEach(function (r) { r.classList.add('d-none'); });
        visibleRows.slice(start, end).forEach(function (r) { r.classList.remove('d-none'); });

        var countEl = document.getElementById('visibleCount');
        if (countEl) countEl.textContent = total + ' event' + (total !== 1 ? 's' : '');

        var pageInfo = document.getElementById('pageInfo');
        if (pageInfo) {
            pageInfo.textContent = total === 0
                ? 'No results'
                : 'Showing ' + (start + 1) + '–' + end + ' of ' + total;
        }
        var prev = document.getElementById('prevPage');
        var next = document.getElementById('nextPage');
        if (prev) prev.disabled = currentPage <= 1;
        if (next) next.disabled = currentPage >= totalPages;
    }

    document.getElementById('prevPage').addEventListener('click', function () {
        if (currentPage > 1) { currentPage--; renderPage(); }
    });
    document.getElementById('nextPage').addEventListener('click', function () {
        var totalPages = Math.ceil(visibleRows.length / PAGE_SIZE);
        if (currentPage < totalPages) { currentPage++; renderPage(); }
    });

    applyFilters();
})();
</script>
</body>
</html>
