<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/head :: eacHead('EAC — HR audit log')}"></th:block>
</head>
<body class="eac-surface min-vh-100">
<div class="dashboard-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar(activePage='auditLog')}"></div>
    <div id="content" class="main-content p-3 p-md-4">
        <div class="d-flex align-items-center gap-2 mb-3">
            <button type="button" id="sidebarToggle" class="btn-hamburger">☰</button>
            <h1 class="h4 fw-bold m-0" style="color:#1a2e2c;">HR audit log</h1>
        </div>
        <p class="text-muted small">Recent changes (employee profile edits, 201 updates, leave decisions). Up to 200 events.</p>
        <div class="table-responsive card border-0 shadow-sm">
            <table class="table table-sm table-hover mb-0">
                <thead class="table-light small text-uppercase text-muted">
                <tr>
                    <th>When (UTC)</th>
                    <th>Actor</th>
                    <th>Action</th>
                    <th>Entity</th>
                    <th>Id</th>
                    <th>Detail</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="e : ${events}">
                    <td class="text-nowrap small" th:text="${e.createdAt}">—</td>
                    <td class="small" th:text="${e.actorUsername}">—</td>
                    <td><span class="badge bg-dark" th:text="${e.action}">—</span></td>
                    <td class="small" th:text="${e.entityType}">—</td>
                    <td class="small" th:text="${e.entityId}">—</td>
                    <td class="small" style="max-width:24rem;white-space:pre-wrap;word-break:break-word;" th:text="${e.detail}">—</td>
                </tr>
                <tr th:if="${events == null or events.isEmpty()}">
                    <td colspan="6" class="text-center text-muted p-4">No events yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    document.getElementById('sidebarToggle')?.addEventListener('click', function () {
        document.getElementById('sidebar')?.classList.toggle('hidden');
        document.getElementById('content')?.classList.toggle('expanded');
    });
</script>
</body>
</html>
