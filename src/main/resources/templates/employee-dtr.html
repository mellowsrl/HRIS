<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: eacHead('DTR — EAC')}"></th:block>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="eac-surface min-vh-100 p-0">
<div class="eac-emp-layout d-flex" th:if="${employee != null}">
    <div th:replace="~{fragments/employee-sidebar :: sidebar(activePage='dtr')}"></div>
    <div class="eac-emp-content flex-grow-1 p-3 p-md-4" style="max-height:100vh;overflow-y:auto;">
        <div th:if="${successMessage}" class="alert alert-success fw-bold py-2" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger fw-bold py-2" th:text="${errorMessage}"></div>

        <div class="d-flex flex-wrap justify-content-between align-items-start gap-2 mb-3">
            <div>
                <h1 class="h4 fw-bold m-0" style="color:#1a2e2c;">Daily Time Record</h1>
                <nav class="eac-empl-breadcrumb mt-1 small text-muted" aria-label="Breadcrumb">
                    <a th:href="@{/employee/dashboard}">Home</a><span class="sep">/</span>
                    <span>DTR</span>
                </nav>
            </div>
            <form method="get" th:action="@{/employee/dtr}" class="d-flex flex-wrap align-items-end gap-2">
                <div>
                    <label class="form-label text-muted small mb-0">Year</label>
                    <input type="number" name="year" class="form-control form-control-sm" style="width:5.5rem" th:value="${dtrYear}" min="2020" max="2100">
                </div>
                <div>
                    <label class="form-label text-muted small mb-0">Month</label>
                    <input type="number" name="month" class="form-control form-control-sm" style="width:4.5rem" th:value="${dtrMonth}" min="1" max="12">
                </div>
                <button type="submit" class="btn btn-sm btn-dark">View</button>
            </form>
        </div>

        <p class="small text-muted mb-2" th:text="${'Period: ' + dtrPeriodLabel}">—</p>

        <div class="eac-dtr-card mb-3">
            <div class="eac-dtr-meta">
                <div class="lbl">Employee name</div>
                <div class="val" th:text="${employee.firstName + ' ' + employee.lastName}">—</div>
                <div class="lbl">Employee id</div>
                <div class="val" th:text="${employee.customEmployeeId}">—</div>
                <div class="lbl">Department</div>
                <div class="val" th:text="${employee.department != null ? employee.department : '—'}">—</div>
                <div class="lbl">Designation</div>
                <div class="val" th:text="${employee.position != null ? employee.position : '—'}">—</div>
                <div class="lbl">Status</div>
                <div class="val" th:text="${employmentDisplay}">—</div>
            </div>
        </div>

        <div class="d-flex flex-wrap align-items-end gap-2 mb-2">
            <form method="get" th:action="@{/employee/dtr}" class="d-flex flex-wrap align-items-end gap-2">
                <input type="hidden" name="year" th:value="${dtrYear}">
                <input type="hidden" name="month" th:value="${dtrMonth}">
                <span class="small text-muted">DTR PDF payroll window (optional)</span>
                <div>
                    <label class="form-label text-muted small mb-0">From</label>
                    <input type="date" class="form-control form-control-sm" name="dtrPdfFrom" th:value="${dtrWindowStart}" required>
                </div>
                <div>
                    <label class="form-label text-muted small mb-0">To</label>
                    <input type="date" class="form-control form-control-sm" name="dtrPdfTo" th:value="${dtrWindowEnd}" required>
                </div>
                <input type="hidden" name="dtrPdfApply" value="custom">
                <button type="submit" class="btn btn-sm btn-outline-secondary">Set window</button>
            </form>
            <a class="btn btn-sm btn-outline-secondary" th:if="${currentCutoff != null}" th:href="@{/employee/dtr/download(cutoffPeriod=${currentCutoff})}">
                <i class="fas fa-file-pdf me-1"></i> Download DTR (PDF)
            </a>
        </div>

        <div class="table-responsive eac-dtr-card" style="max-height:70vh;overflow:auto;">
            <table class="table table-sm table-bordered mb-0 eac-dtr-table">
                <thead class="eac-dtr-thead">
                <tr>
                    <th>Date</th>
                    <th>Arrival</th>
                    <th>Departure</th>
                    <th>Arrival</th>
                    <th>Departure</th>
                    <th>Late</th>
                    <th>U.T.</th>
                    <th>O.T.</th>
                    <th>Remarks</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row : ${dtrRows}">
                    <td class="text-nowrap" th:text="${row.dateDisplay}">—</td>
                    <th:block th:if="${row.hasLog}">
                        <td th:text="${row.in1}">—</td>
                        <td th:text="${row.out1}">—</td>
                        <td th:text="${row.in2}">—</td>
                        <td th:text="${row.out2}">—</td>
                        <td th:text="${row.late}">—</td>
                        <td th:text="${row.under}">—</td>
                        <td th:text="${row.ot}">—</td>
                        <td>
                            <div class="d-flex flex-wrap gap-1 align-items-center justify-content-end">
                                <span th:if="${row.dayStatus != null and !#strings.isEmpty(row.dayStatus) and row.dayStatus != '—'}"
                                      class="badge eac-dtr-badge--day" th:text="${row.dayStatus}">—</span>
                                <span th:if="${row.remarkType == 'PENALTY'}" class="badge eac-dtr-badge--penalty">Penalty</span>
                                <span th:if="${row.remarkType == 'OK'}" class="badge eac-dtr-badge--ok">Present</span>
                            </div>
                        </td>
                    </th:block>
                    <th:block th:unless="${row.hasLog}">
                        <td colspan="4" class="eac-dtr-nolog">— No Logs —</td>
                        <td>—</td>
                        <td>—</td>
                        <td>—</td>
                        <td>
                            <span class="badge eac-dtr-badge--rest">No record</span>
                        </td>
                    </th:block>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
