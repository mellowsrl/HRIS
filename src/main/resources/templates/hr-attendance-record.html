<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/head :: eacHead('HR — Employee DTR')}"></th:block>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="eac-surface min-vh-100">
<div class="dashboard-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar(activePage='attendanceAdmin')}"></div>
    <div id="content" class="main-content eac-empl-page">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3" th:if="${employee != null}">
            <div class="d-flex align-items-center gap-2">
                <button type="button" id="sidebarToggle" class="btn-hamburger">☰</button>
                <a th:href="@{/hr/attendance}" class="btn btn-sm btn-light border">← Attendance admin</a>
            </div>
            <a th:if="${employee != null}" th:href="@{/hr/attendance/download(id=${employee.id})}" class="btn btn-sm text-white border-0 fw-bold" style="background:#8b1538;">PDF DTR</a>
        </div>
        <div th:if="${employee != null}">
            <h1 class="h4 fw-bold" style="color:#1a2e2c;">Biometrics log</h1>
            <p class="text-muted small mb-3" th:text="${employee.firstName + ' ' + employee.lastName + ' — ' + employee.customEmployeeId + ' — ' + (employee.department != null ? employee.department : '')}"></p>
            <p class="small text-muted mb-0">Regular hours from TCMS; OT follows HR approval rules.</p>
        </div>
        <div th:if="${employee == null}" class="alert alert-warning">Employee not found.</div>

        <div class="eac-empl-data-card shadow-sm" th:if="${employee != null}">
            <div class="table-responsive">
                <table class="table table-hover table-sm m-0">
                    <thead class="table-light small text-uppercase text-muted">
                    <tr>
                        <th>Date</th>
                        <th>Day / leave</th>
                        <th>Time in</th>
                        <th>Time out</th>
                        <th>Reg. hours</th>
                        <th>Late (min)</th>
                        <th>Undertime (h)</th>
                        <th>OT reported</th>
                        <th>OT approval</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="log : ${logs}">
                        <td class="fw-bold" th:text="${log.date}">—</td>
                        <td th:text="${log.timeIn != null ? log.timeIn : '—'}">—</td>
                        <td th:text="${log.timeOut != null ? log.timeOut : (log.timeIn != null ? 'Open' : '—')}">—</td>
                        <td th:text="${log.totalHours != null ? (log.totalHours + ' h') : '—'}">—</td>
                        <td th:text="${log.minutesLate != null ? log.minutesLate : '0'}">0</td>
                        <td th:text="${log.undertimeHours != null ? log.undertimeHours : '0'}">0</td>
                        <td th:text="${log.overtimeReported != null ? log.overtimeReported : '0'}">0</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${(log.otApprovalStatus == 'APPROVED') ? 'bg-success' : ((log.otApprovalStatus == 'PENDING') ? 'bg-warning text-dark' : 'bg-secondary')}"
                                  th:text="${log.otApprovalStatus != null ? log.otApprovalStatus : '—'}">—</span>
                        </td>
                    </tr>
                    <tr th:if="${logs == null or #lists.isEmpty(logs)}">
                        <td colspan="9" class="text-center text-muted p-4">No biometrics data for this employee.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click', function () {
        document.getElementById('sidebar').classList.toggle('hidden');
        document.getElementById('content').classList.toggle('expanded');
    });
</script>
</body>
</html>
