<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: eacHead('HR — Overtime approvals')}"></th:block>
</head>
<body class="eac-surface min-vh-100">

<div class="dashboard-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar(activePage='overtime')}"></div>

    <div id="content" class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div class="d-flex align-items-center">
                <button id="sidebarToggle" class="btn-hamburger">☰</button>
                <div>
                    <h2 class="text-danger fw-bold m-0">Overtime approvals</h2>
                    <p class="text-muted small mb-0">Biometrics OT is pending until approved. Payable / DTR totals use approved hours only.</p>
                </div>
            </div>
            <form method="get" th:action="@{/hr/overtime-approvals}" class="d-flex flex-wrap align-items-center gap-2">
                <label class="small fw-bold text-secondary mb-0">Cutoff</label>
                <select name="cutoffPeriod" class="form-select form-select-sm" style="min-width: 220px;" onchange="this.form.submit()">
                    <option th:each="c : ${cutoffOptions}" th:value="${c.key}" th:text="${c.value}"
                            th:selected="${selectedCutoff == c.key}"></option>
                </select>
                <input type="search" name="search" class="form-control form-control-sm" style="min-width: 200px;" th:value="${searchKeyword}" placeholder="Name, ID, date...">
                <button type="submit" class="btn btn-sm btn-dark">Search</button>
            </form>
        </div>

        <div class="card p-4 shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>Attendance ID</th>
                            <th>Employee</th>
                            <th>Work date</th>
                            <th>Reported OT (hrs)</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="row : ${otItems}">
                            <td class="fw-bold text-muted" th:text="${row.attendanceId}"></td>
                            <td class="text-start">
                                <div class="fw-bold" th:text="${row.employeeName}"></div>
                                <div class="small text-muted" th:text="${row.customEmployeeId}"></div>
                            </td>
                            <td th:text="${row.workDate}"></td>
                            <td><span class="badge bg-warning text-dark" th:text="${row.reportedOtHours} + ' h'"></span></td>
                            <td>
                                <div class="d-flex justify-content-center gap-2 flex-wrap">
                                    <form th:action="@{/hr/overtime-approvals/approve}" method="post" class="d-inline">
                                        <input type="hidden" name="attendanceId" th:value="${row.attendanceId}">
                                        <input type="hidden" name="cutoffPeriod" th:value="${selectedCutoff}">
                                        <input type="hidden" name="search" th:value="${searchKeyword}">
                                        <button type="submit" class="btn btn-sm btn-success fw-bold" onclick="return confirm('Approve reported OT for this day?');">Approve</button>
                                    </form>
                                    <form th:action="@{/hr/overtime-approvals/reject}" method="post" class="d-inline">
                                        <input type="hidden" name="attendanceId" th:value="${row.attendanceId}">
                                        <input type="hidden" name="cutoffPeriod" th:value="${selectedCutoff}">
                                        <input type="hidden" name="search" th:value="${searchKeyword}">
                                        <button type="submit" class="btn btn-sm btn-danger fw-bold" onclick="return confirm('Reject this OT? It will not count as payable time.');">Reject</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${otItems == null or otItems.isEmpty()}">
                            <td colspan="5" class="text-center text-muted p-4">No pending overtime for this cutoff.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click', function () {
        document.getElementById('sidebar').classList.toggle('hidden');
        document.getElementById('content').classList.toggle('expanded');
    });
</script>
</body>
</html>
