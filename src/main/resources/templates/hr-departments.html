<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/head :: eacHead('HR — Departments')}"></th:block>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="eac-surface min-vh-100">
<div class="dashboard-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar(activePage='departments')}"></div>
    <div id="content" class="main-content eac-empl-page eac-dept-page">
        <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-3">
            <div class="d-flex align-items-start gap-3 min-w-0">
                <button type="button" id="sidebarToggle" class="btn-hamburger me-0 mt-1 flex-shrink-0">☰</button>
                <div>
                    <h1 class="h4 fw-bold m-0" style="color: var(--eac-dark-gray, #2d3436); letter-spacing: -0.5px;">Departments</h1>
                    <nav class="eac-empl-breadcrumb mt-1" aria-label="Breadcrumb">
                        <a th:href="@{/}">Home</a><span class="sep">/</span>
                        <a th:href="@{/hr/employees}">Employee</a><span class="sep">/</span>
                        <span>Departments</span>
                    </nav>
                </div>
            </div>
            <div class="d-flex flex-wrap gap-2 align-items-center">
                <button type="button" class="btn btn-sm btn-danger text-white shadow-sm border-0 fw-bold px-3"
                        data-bs-toggle="modal" data-bs-target="#addDepartmentModal" title="Add a school or administrative unit (Emilio Aguinaldo College)">
                    <i class="fas fa-plus me-1"></i> Add department
                </button>
            </div>
        </div>

        <div th:if="${successMessage}" class="alert alert-success fw-bold shadow-sm" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger fw-bold shadow-sm" th:text="${errorMessage}"></div>

        <div class="eac-dept-data-card shadow-sm overflow-hidden">
            <div class="eac-dept-list-head d-flex flex-wrap justify-content-between align-items-center gap-2 px-3 py-2">
                <h6 class="m-0 fw-bold text-white">Department list</h6>
                <div class="d-flex flex-wrap align-items-center gap-2 eac-dept-filters">
                    <select class="form-select form-select-sm eac-dept-sel" id="eacDeptFilterBranch" title="Filter by branch / campus" aria-label="All branches">
                        <option value="">All branches</option>
                    </select>
                    <select class="form-select form-select-sm eac-dept-sel" id="eacDeptFilterStatus" title="Status" aria-label="All statuses">
                        <option value="">All statuses</option>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                    <select class="form-select form-select-sm eac-dept-sel" id="eacDeptSortBy" title="Sort" aria-label="Sort by">
                        <option value="name">Sort by: Department (A–Z)</option>
                        <option value="code">Sort by: Code (A–Z)</option>
                        <option value="emp">Sort by: No. of employees (high → low)</option>
                    </select>
                </div>
            </div>
            <div class="bg-white p-3 border border-top-0 rounded-bottom" style="border-color: #e8ecec !important;">
                <div class="d-flex flex-wrap justify-content-between align-items-end gap-2 mb-2">
                    <div>
                        <label class="form-label text-muted small mb-0" for="eacDeptPageSize">Row per page</label>
                        <select class="form-select form-select-sm" id="eacDeptPageSize" style="min-width: 5rem; max-width: 8rem;">
                            <option value="10" selected>10</option>
                            <option value="25">25</option>
                            <option value="50">50</option>
                        </select>
                    </div>
                    <div class="flex-grow-1" style="max-width: 20rem; min-width: 10rem;">
                        <label class="form-label text-muted small mb-0" for="eacDeptSearch">Search</label>
                        <input type="search" class="form-control form-control-sm" id="eacDeptSearch" placeholder="Name, code, or head" autocomplete="off" aria-label="Search departments">
                    </div>
                </div>

                <div class="table-responsive eac-empl-table-wrap">
                    <table class="table table-hover table-sm align-middle mb-0" id="eacDeptTable">
                        <thead class="table-light small text-uppercase text-muted" style="font-size: 0.7rem; letter-spacing: 0.04em;">
                        <tr>
                            <th scope="col">Department</th>
                            <th scope="col">Code</th>
                            <th scope="col" class="text-end">No. of employees</th>
                            <th scope="col">Head</th>
                            <th scope="col">Branch</th>
                            <th scope="col">Status</th>
                            <th scope="col" class="text-end">Action</th>
                        </tr>
                        </thead>
                        <tbody id="eacDeptTbody">
                        <tr th:each="d : ${departments}" class="eac-dept-data-row d-none"
                            th:attr="data-name=${d.name},
                                     data-code=${d.code},
                                     data-emp=${d.activeEmployeeCount},
                                     data-head=${d.headName != null ? d.headName : ''},
                                     data-branch=${d.branch},
                                     data-st=${d.status}">
                            <td class="fw-semibold">
                                <a th:if="${d.code != null and !#strings.isEmpty(d.code)}" th:href="@{/hr/employees(department=${d.code})}" class="text-decoration-none text-dark" th:text="${d.name}" th:title="${'View employees in ' + d.name}">Name</a>
                                <span th:unless="${d.code != null and !#strings.isEmpty(d.code)}" th:text="${d.name}">Name</span>
                            </td>
                            <td><span class="badge bg-light text-dark border" th:text="${d.code}">CODE</span></td>
                            <td class="text-end fw-bold">
                                <a th:if="${d.code != null and !#strings.isEmpty(d.code)}" th:href="@{/hr/employees(department=${d.code})}" class="text-decoration-none text-dark" th:text="${#numbers.formatDecimal(d.activeEmployeeCount, 0, 'COMMA', 0, 'POINT')}" th:title="${'View employees in ' + d.name}">0</a>
                                <span th:unless="${d.code != null and !#strings.isEmpty(d.code)}" th:text="${#numbers.formatDecimal(d.activeEmployeeCount, 0, 'COMMA', 0, 'POINT')}">0</span>
                            </td>
                            <td>
                                <span th:if="${d.headName == null or #strings.isEmpty(d.headName)}" class="text-muted fst-italic">No head assigned</span>
                                <span th:if="${d.headName != null and !#strings.isEmpty(d.headName)}" th:text="${d.headName}">Dean</span>
                            </td>
                            <td th:text="${d.branch}">Main</td>
                            <td>
                                <span th:if="${#strings.toString(d.status) == 'Active'}" class="eac-dept-pill eac-dept-pill--active"><span class="dot me-1"></span>Active</span>
                                <span th:unless="${#strings.toString(d.status) == 'Active'}" class="eac-dept-pill eac-dept-pill--off"><span class="dot me-1"></span><span th:text="${d.status}">Inactive</span></span>
                            </td>
                            <td class="text-end text-nowrap">
                                <button type="button" class="btn btn-sm btn-link text-decoration-none p-1 eac-dept-open-edit" title="Edit"
                                        th:attr="data-id=${d.id},
                                                 data-name=${d.name},
                                                 data-code=${d.code},
                                                 data-head=${d.headName != null ? d.headName : ''},
                                                 data-branch=${d.branch},
                                                 data-status=${d.status}">
                                    <i class="fas fa-edit text-primary"></i>
                                </button>
                                <a th:href="@{/hr/departments/delete(id=${d.id})}" class="btn btn-sm btn-link text-decoration-none p-1" title="Delete" data-eac-confirm="Remove this department from the master list?">
                                    <i class="fas fa-trash-alt text-danger"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 border-top pt-2 mt-2 small text-muted" style="border-color: #e8ecec !important;">
                    <div id="eacDeptPageInfo" class="mb-0">—</div>
                    <div class="d-flex align-items-center gap-1">
                        <button type="button" class="btn btn-sm btn-outline-secondary" id="eacDeptPrev" aria-label="Previous page">«</button>
                        <span class="px-1"><span class="badge rounded-pill" id="eacDeptPageNo">1</span></span>
                        <button type="button" class="btn btn-sm btn-outline-secondary" id="eacDeptNext" aria-label="Next page">»</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add -->
<div class="modal fade" id="addDepartmentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <form th:action="@{/hr/departments/add}" method="post" class="modal-content">
                <div class="modal-header eac-modal-header">
                    <h5 class="modal-title text-white fw-bold">Add department</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-2">
                        <label class="form-label small mb-0">Department name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control form-control-sm" required maxlength="200" placeholder="e.g. School of Nursing" autocomplete="off">
                    </div>
                    <div class="mb-2">
                        <label class="form-label small mb-0">Code <span class="text-danger">*</span></label>
                        <input type="text" name="code" class="form-control form-control-sm text-uppercase" required maxlength="20" pattern="[A-Za-z0-9\-]+" title="Letters, numbers, hyphen" placeholder="e.g. SON" autocomplete="off">
                        <p class="small text-muted mb-0">Must be unique. Match the code used in employee profiles.</p>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small mb-0">Head (Dean / director)</label>
                        <input type="text" name="headName" class="form-control form-control-sm" maxlength="200" placeholder="Optional" autocomplete="off">
                    </div>
                    <div class="mb-2">
                        <label class="form-label small mb-0">Branch / campus <span class="text-danger">*</span></label>
                        <select name="branch" class="form-select form-select-sm" required>
                            <option th:each="b : ${branchChoices}" th:value="${b}" th:text="${b}">Main</option>
                        </select>
                    </div>
                    <div class="mb-0">
                        <label class="form-label small mb-0">Status</label>
                        <select name="status" class="form-select form-select-sm">
                            <option value="Active" selected>Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-sm btn-danger text-white border-0 fw-bold px-3">Save</button>
                </div>
        </form>
    </div>
</div>

<!-- Edit -->
<div class="modal fade" id="editDepartmentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <form th:action="@{/hr/departments/edit}" method="post" class="modal-content" id="eacDeptEditForm">
                <div class="modal-header eac-modal-header">
                    <h5 class="modal-title text-white fw-bold">Edit department</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="id" id="eacDeptEditId">
                    <div class="mb-2">
                        <label class="form-label small mb-0" for="eacDeptEditName">Department name <span class="text-danger">*</span></label>
                        <input type="text" name="name" id="eacDeptEditName" class="form-control form-control-sm" required maxlength="200" autocomplete="off">
                    </div>
                    <div class="mb-2">
                        <label class="form-label small mb-0" for="eacDeptEditCode">Code <span class="text-danger">*</span></label>
                        <input type="text" name="code" id="eacDeptEditCode" class="form-control form-control-sm text-uppercase" required maxlength="20" pattern="[A-Za-z0-9\-]+" title="Letters, numbers, hyphen" autocomplete="off">
                    </div>
                    <div class="mb-2">
                        <label class="form-label small mb-0" for="eacDeptEditHead">Head (Dean / director)</label>
                        <input type="text" name="headName" id="eacDeptEditHead" class="form-control form-control-sm" maxlength="200" placeholder="Optional" autocomplete="off">
                    </div>
                    <div class="mb-2">
                        <label class="form-label small mb-0" for="eacDeptEditBranch">Branch / campus <span class="text-danger">*</span></label>
                        <select name="branch" id="eacDeptEditBranch" class="form-select form-select-sm" required>
                            <option th:each="b : ${branchChoices}" th:value="${b}" th:text="${b}">Main</option>
                        </select>
                    </div>
                    <div class="mb-0">
                        <label class="form-label small mb-0" for="eacDeptEditStatus">Status</label>
                        <select name="status" id="eacDeptEditStatus" class="form-select form-select-sm">
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-sm btn-danger text-white border-0 fw-bold px-3">Update</button>
                </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
    const tbody = document.getElementById('eacDeptTbody');
    const pageInfo = document.getElementById('eacDeptPageInfo');
    const sizeSel = document.getElementById('eacDeptPageSize');
    const fBranch = document.getElementById('eacDeptFilterBranch');
    const fSt = document.getElementById('eacDeptFilterStatus');
    const fSort = document.getElementById('eacDeptSortBy');
    const search = document.getElementById('eacDeptSearch');
    const prev = document.getElementById('eacDeptPrev');
    const next = document.getElementById('eacDeptNext');
    const pageNo = document.getElementById('eacDeptPageNo');
    let page = 0;

    function allRows() {
        if (!tbody) return [];
        return Array.prototype.slice.call(tbody.querySelectorAll('tr.eac-dept-data-row'));
    }

    function rowMatchesText(r) {
        const q = (search && search.value) ? search.value.toLowerCase().trim() : '';
        if (!q) return true;
        const a = (r.getAttribute('data-name') || '') + ' ' + (r.getAttribute('data-code') || '') + ' ' + (r.getAttribute('data-head') || '');
        return a.toLowerCase().indexOf(q) >= 0;
    }

    function rowMatches(r) {
        if (fBranch && fBranch.value) {
            if ((r.getAttribute('data-branch') || '') !== fBranch.value) return false;
        }
        if (fSt && fSt.value) {
            if ((r.getAttribute('data-st') || '') !== fSt.value) return false;
        }
        if (!rowMatchesText(r)) return false;
        return true;
    }

    function runFilter() {
        const all = allRows();
        all.forEach(function (r) { r.classList.add('d-none'); });
        let vis = all.filter(rowMatches);
        const by = fSort && fSort.value ? fSort.value : 'name';
        vis.sort(function (a, b) {
            if (by === 'emp') {
                const na = parseInt((a.getAttribute('data-emp') || '0'), 10) || 0;
                const nb = parseInt((b.getAttribute('data-emp') || '0'), 10) || 0;
                return nb - na;
            }
            const ka = (by === 'code' ? a.getAttribute('data-code') : a.getAttribute('data-name')) || '';
            const kb = (by === 'code' ? b.getAttribute('data-code') : b.getAttribute('data-name')) || '';
            if (ka.toLowerCase() < kb.toLowerCase()) return -1;
            if (ka.toLowerCase() > kb.toLowerCase()) return 1;
            return 0;
        });
        if (tbody) {
            vis.forEach(function (r) { tbody.appendChild(r); });
            all.forEach(function (r) { if (vis.indexOf(r) < 0) tbody.appendChild(r); });
        }
        const ps = sizeSel ? (parseInt(sizeSel.value, 10) || 10) : 10;
        const L = vis.length;
        const maxPage = Math.max(0, Math.ceil(L / ps) - 1);
        if (page > maxPage) page = maxPage;
        if (L === 0) page = 0;
        const start = page * ps;
        vis.forEach(function (r, i) {
            r.classList.toggle('d-none', i < start || i >= start + ps);
        });
        if (pageInfo) {
            if (L === 0) {
                pageInfo.textContent = 'Showing 0 to 0 of 0 entries';
            } else {
                const from = start + 1;
                const to = Math.min(L, start + ps);
                pageInfo.textContent = 'Showing ' + from + ' to ' + to + ' of ' + L + ' entries';
            }
        }
        if (pageNo) pageNo.textContent = String(page + 1);
        if (prev) prev.disabled = page <= 0;
        if (next) next.disabled = (start + ps >= L);
    }

    function fillBranchFilter() {
        if (!fBranch) return;
        const seen = new Set();
        allRows().forEach(function (r) {
            const t = (r.getAttribute('data-branch') || '').trim();
            if (t) seen.add(t);
        });
        const cur = fBranch.value;
        fBranch.innerHTML = '<option value="">All branches</option>';
        Array.from(seen).sort(function (a, b) { return a.toLowerCase().localeCompare(b.toLowerCase()); }).forEach(function (b) {
            const o = document.createElement('option');
            o.value = b;
            o.textContent = b;
            fBranch.appendChild(o);
        });
        fBranch.value = cur;
    }

    document.addEventListener('DOMContentLoaded', function () {
        fillBranchFilter();
        [fBranch, fSt, fSort, sizeSel].forEach(function (el) {
            if (el) el.addEventListener('change', function () { page = 0; runFilter(); });
        });
        if (search) search.addEventListener('input', function () { page = 0; runFilter(); });
        if (prev) prev.addEventListener('click', function () { if (page > 0) { page--; runFilter(); } });
        if (next) next.addEventListener('click', function () { page++; runFilter(); });
        allRows().forEach(function (r) { r.classList.remove('d-none'); });
        runFilter();

        document.querySelectorAll('a[data-eac-confirm]').forEach(function (a) {
            a.addEventListener('click', function (ev) {
                const m = a.getAttribute('data-eac-confirm');
                if (m && !window.confirm(m)) {
                    ev.preventDefault();
                }
            });
        });

        document.querySelectorAll('.eac-dept-open-edit').forEach(function (btn) {
            btn.addEventListener('click', function () {
                const id = btn.getAttribute('data-id');
                const name = btn.getAttribute('data-name') || '';
                const code = btn.getAttribute('data-code') || '';
                const head = btn.getAttribute('data-head') || '';
                const branch = btn.getAttribute('data-branch') || '';
                const st = btn.getAttribute('data-status') || 'Active';
                const form = document.getElementById('eacDeptEditForm');
                if (form) form.querySelector('#eacDeptEditId').value = id;
                document.getElementById('eacDeptEditName').value = name;
                document.getElementById('eacDeptEditCode').value = code;
                document.getElementById('eacDeptEditHead').value = head;
                const br = document.getElementById('eacDeptEditBranch');
                if (br) { br.value = branch; if (br.value !== branch) { var o = new Option(branch, branch); br.add(o); br.value = branch; } }
                const ss = document.getElementById('eacDeptEditStatus');
                if (ss) ss.value = st;
                var m = new bootstrap.Modal(document.getElementById('editDepartmentModal'));
                m.show();
            });
        });
    });
})();

document.getElementById('sidebarToggle').addEventListener('click', function () {
    document.getElementById('sidebar').classList.toggle('hidden');
    document.getElementById('content').classList.toggle('expanded');
});
</script>
</body>
</html>
