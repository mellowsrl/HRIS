<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: eacHead('HR — Job postings')}"></th:block>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="eac-surface min-vh-100 d-flex flex-column">

<div class="dashboard-wrapper d-flex align-items-stretch flex-grow-1 min-vh-100">
    <div th:replace="~{fragments/sidebar :: sidebar(activePage='jobs')}" style="width: 250px; flex-shrink: 0;"></div>

    <div id="content" class="main-content d-flex flex-column flex-grow-1 w-100 p-4 eac-hr-jobs-content">

        <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-3">
            <div class="d-flex align-items-start gap-3 min-w-0">
                <button type="button" id="sidebarToggle" class="btn-hamburger me-0 mt-1 flex-shrink-0">☰</button>
                <div>
                    <h1 class="h4 fw-bold m-0" style="color: var(--eac-dark-gray, #2d3436); letter-spacing: -0.5px;">Job Postings</h1>
                    <nav class="eac-empl-breadcrumb mt-1" aria-label="Breadcrumb">
                        <a th:href="@{/}">Home</a><span class="sep">/</span>
                        <span>Job Postings</span>
                    </nav>
                </div>
            </div>
            <div class="d-flex flex-wrap gap-2 align-items-center">
                <form method="get" th:action="@{/hr/jobs}" class="d-flex flex-wrap align-items-center gap-2">
                    <input type="search" name="search" class="form-control form-control-sm" style="min-width:150px; max-width:200px;" th:value="${searchKeyword}" placeholder="Title, school, type…">
                    <select name="role" class="form-select form-select-sm" style="min-width:120px; max-width:160px;" aria-label="Filter by role type">
                        <option value="all" th:selected="${roleFilter == 'all'}">All types</option>
                        <option value="faculty" th:selected="${roleFilter == 'faculty'}">Faculty</option>
                        <option value="nonfaculty" th:selected="${roleFilter == 'nonfaculty'}">Non-faculty</option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-outline-secondary px-3">Search</button>
                </form>
                <a th:href="@{/hr/jobs/new}" class="btn btn-sm btn-danger fw-bold px-3 shadow-sm text-nowrap">
                    <i class="fas fa-plus me-1"></i> Post New Job
                </a>
            </div>
        </div>

        <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show shadow-sm mb-4" role="alert">
            <strong>Success!</strong> Job posting has been saved and is now live.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${notFound}" class="alert alert-warning alert-dismissible fade show shadow-sm mb-4" role="alert">
            That job could not be found. It may have been removed.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow-sm border-0 eac-hr-jobs-table-card flex-grow-1 d-flex flex-column" style="border-radius: 12px;">
            <div class="card-body p-0 d-flex flex-column flex-grow-1">
                <div class="table-responsive flex-grow-1">
                    <table class="table table-hover align-middle m-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-4 py-3">Job Title</th>
                            <th>Department</th>
                            <th>Type</th>
                            <th>Date Posted</th>
                            <th class="text-center">Status</th>
                            <th class="pe-4 text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="job : ${jobs}">
                            <td class="ps-4 fw-bold text-dark" th:text="${job.title}"></td>
                            <td class="text-muted" th:text="${@departmentCodeService.getDisplayName(job.department)}"></td>
                            <td class="text-muted small text-uppercase" th:text="${job.employmentType}"></td>
                            <td class="text-muted" th:text="${job.datePosted}"></td>
                            <td class="text-center">
                                <span th:if="${job.status == 'OPEN'}" class="badge bg-success text-white rounded-pill px-3">OPEN</span>
                                <span th:if="${job.status == 'CLOSED'}" class="badge bg-dark text-white rounded-pill px-3">CLOSED</span>
                                <span th:if="${job.status != 'OPEN' and job.status != 'CLOSED' and job.status != null}" class="badge bg-secondary text-white rounded-pill px-3" th:text="${job.status}">OTHER</span>
                            </td>
                            <td class="pe-4 text-end">
                                <a th:href="@{/hr/jobs/{id}/edit(id=${job.id})}" class="btn btn-sm btn-outline-secondary rounded-pill px-3">Edit</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(jobs)}" class="eac-empty-row">
                            <td colspan="6" class="eac-empty-cell">
                                <i class="fas fa-briefcase eac-empty-icon"></i>
                                <span class="eac-empty-text">No job postings found.</span>
                                <span class="eac-empty-text">Try widening your search or <a th:href="@{/hr/jobs/new}" class="text-danger fw-semibold text-decoration-none">post a new job</a>.</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('sidebarToggle').addEventListener('click', function () {
    document.getElementById('sidebar').classList.toggle('hidden');
    document.getElementById('content').classList.toggle('expanded');
});
</script>
</body>
</html>
