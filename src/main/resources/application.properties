e# App Name
spring.application.name=EAC_HR_Admission

# Database Connection (override with DB_URL, DB_USERNAME, DB_PASSWORD in production)
# Use 127.0.0.1 (not localhost) with XAMPP on Windows — avoids IPv6 ::1 vs MySQL on IPv4-only.
# useSSL=false: local XAMPP; allowPublicKeyRetrieval: MySQL 8 default auth from Java.
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/eac_hr_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Manila&connectTimeout=15000&socketTimeout=60000}
spring.datasource.username=${DB_USERNAME:root}
# Local default below; override with env DB_PASSWORD for other machines or production.
spring.datasource.password=${DB_PASSWORD:7002}
spring.jpa.hibernate.ddl-auto=update 
# Set to 'none' because we are using Stored Procedures and existing tables
# JPA: AttendanceLog maps to MySQL table "attendance" (not attendance_logs). See employee/sql/verify_attendance_alignment.sql

# Email — set MAIL_USERNAME and MAIL_PASSWORD (Gmail app password) via env; leave blank to skip sending
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.thymeleaf.cache=false

# R\u00e9sum\u00e9 uploads (PDF only; served under /uploads/applicant-resume/)
app.upload.resume-dir=uploads/applicant-resume
app.upload.overtime-dir=uploads/overtime-attachments
app.upload.official-business-dir=uploads/official-business-attachments
app.upload.employee-photo-dir=uploads/employee-photos
# Multipart: Spring + Tomcat must both allow the full request (PDF + form fields).
# Tomcat default max POST is 2MB; without this, large PDFs throw MultipartException before the controller.
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.file-size-threshold=0
server.tomcat.max-http-form-post-size=20MB
server.tomcat.max-swallow-size=20MB
# Tomcat 10.1+ / Spring Boot 4: default max-part-count is 10. Each form field in multipart is a "part" (file + all inputs).
# Large forms exceed 10 and throw FileCountLimitExceededException. Use 100+ to match typical HR forms.
server.tomcat.max-part-count=100
# Optional: long file names in Content-Disposition (defaults are often enough)
# server.tomcat.max-part-header-size=4096

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Dev: fewer failed restarts (Windows / DevTools) ---
# Let embedded Tomcat finish shutting down so port 8080 is released before the next bind.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=15s
# Wait for a full compile batch; reduces split-updates that cause ClassNotFound in RestartClassLoader
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s
# If 8080 is still taken by a zombie process, stop the other Java run, or set server.port=8081
server.port=8080