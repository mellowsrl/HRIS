# Tests must not require a live MySQL server. Hibernate 7 needs a reachable JDBC URL
# to resolve the dialect; use in-memory H2 with MySQL compatibility mode.
spring.datasource.url=jdbc:h2:mem:eac_hr_test;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

# Ensure MailSenderAutoConfiguration runs (dummy SMTP; no messages are sent in tests).
spring.mail.host=127.0.0.1
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
