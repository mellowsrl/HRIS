<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EAC Biometrics Kiosk</title>
    <link rel="icon" type="image/png" th:href="@{/image/logo.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="standalone-body bg-gradient-vertical flex-center" onload="startTime()">

    <div class="kiosk-card">
        <img th:src="@{/image/logo.png}" alt="EAC Logo" class="logo-sm" style="max-width: 90px; margin-bottom: 15px;">
        <h3 class="fw-bold" style="color: #D60000;">Biometrics Scanner</h3>
        
        <div id="dateDisplay" class="date-display"></div>
        <div id="txt" class="clock"></div>

        <div th:if="${message}" class="alert alert-info fw-bold shadow-sm" th:text="${message}"></div>

        <form th:action="@{/kiosk/tap}" method="post">
            <div class="mb-4 mt-3">
                <label class="form-label fw-bold text-secondary">Enter Employee ID</label>
                <input type="number" name="employeeId" class="form-control kiosk-input p-3 shadow-sm" required>
            </div>
            <div class="d-flex gap-3">
                <button type="submit" name="action" value="TIME_IN" class="btn btn-time-in w-100 p-3 fw-bold fs-5">TIME IN</button>
                <button type="submit" name="action" value="TIME_OUT" class="btn btn-time-out w-100 p-3 fw-bold fs-5">TIME OUT</button>
            </div>
        </form>
        <a href="/" class="btn btn-link mt-4" style="color: #888; text-decoration: none;">&larr; Back to Home</a>
    </div>

    <script>
        function startTime() {
            const today = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('dateDisplay').innerHTML = today.toLocaleDateString('en-US', options);
            let h = today.getHours(); let m = today.getMinutes(); let s = today.getSeconds();
            let ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12; h = h ? h : 12; 
            m = checkTime(m); s = checkTime(s);
            document.getElementById('txt').innerHTML =  h + ":" + m + ":" + s + " <span style='font-size:1.5rem; color:#888;'>" + ampm + "</span>";
            setTimeout(startTime, 1000);
        }
        function checkTime(i) { if (i < 10) {i = "0" + i}; return i; }
    </script>
</body>
</html>
