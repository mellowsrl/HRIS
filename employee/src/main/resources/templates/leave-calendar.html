<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EAC HR - Leave Calendar</title>
    <link rel="icon" type="image/png" th:href="@{/image/logo.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    
    <style>
        /* EAC Custom Calendar Styling */
        .card { border: none; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); background-color: white; }
        
        .fc-toolbar-title { font-weight: 800; color: #2d3436; text-transform: uppercase; font-size: 1.5rem !important; }
        
        .fc-button-primary { 
            background-color: #2d3436 !important; border-color: #2d3436 !important; 
            text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; border-radius: 8px !important; transition: all 0.2s;
        }
        .fc-button-primary:hover { background-color: #1a1e1f !important; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .fc-button-active { background-color: #D60000 !important; border-color: #D60000 !important; }
        
        .fc-day-today { background-color: #f4f7f6 !important; border: 3px solid #2d3436 !important; }
        
        .fc-col-header-cell-cushion, .fc-daygrid-day-number { 
            color: #2d3436 !important; font-weight: bold; text-decoration: none !important; padding: 8px; 
        }
        .fc-col-header-cell-cushion:hover, .fc-daygrid-day-number:hover { color: #D60000 !important; }
        
        .fc-event { 
            cursor: pointer; border-radius: 4px; font-weight: 700; padding: 4px 6px; margin-bottom: 3px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); font-size: 0.85rem; border-left: 4px solid !important;
        }
        
        .legend-dot { display: inline-block; width: 14px; height: 14px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
        .legend-text { font-weight: 600; color: #2d3436; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="dashboard-wrapper">

    <div th:replace="~{fragments/sidebar :: sidebar(activePage='history')}"></div>

    <div id="content" class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center">
                <button id="sidebarToggle" class="btn-hamburger">☰</button>
                <h2 class="text-dark fw-bold m-0" th:text="${employee.firstName + ' ' + employee.lastName + ' - Leave Calendar'}"></h2>
            </div>
            <a th:href="@{/hr/leave-history}" class="btn btn-dark fw-bold px-4 py-2 shadow-sm" style="border-radius: 8px;">
                <i class="fas fa-arrow-left me-2"></i> Return to Directory
            </a>
        </div>

        <div class="card p-4 shadow-sm border-0">
            <div class="d-flex justify-content-center mb-4 gap-4 bg-light py-3 rounded">
                <span class="legend-text"><span class="legend-dot" style="background-color: #d1e7dd; border: 1px solid #0f5132;"></span> Approved</span>
                <span class="legend-text"><span class="legend-dot" style="background-color: #e2e3e5; border: 1px solid #383d41;"></span> Pending</span>
                <span class="legend-text"><span class="legend-dot" style="background-color: #f8d7da; border: 1px solid #842029;"></span> Rejected</span>
            </div>
            
            <div id="calendar"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    document.getElementById('sidebarToggle').addEventListener('click', function () {
        document.getElementById('sidebar').classList.toggle('hidden');
        document.getElementById('content').classList.toggle('expanded');
    });

    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        
        var rawEvents = [
            /*[# th:each="leave : ${allLeaves}"]*/
            {
                title: /*[[${leave.leaveType + ' (' + leave.status + ')'}]]*/ 'Leave',
                start: /*[[${leave.startDate.toString()}]]*/ '2026-01-01',
                end: /*[[${leave.endDate.toString()}]]*/ '2026-01-02',
                status: /*[[${leave.status}]]*/ 'PENDING'
            },
            /*[/]*/
        ];

        var formattedEvents = rawEvents.map(function(evt) {
            var eDate = new Date(evt.end);
            eDate.setDate(eDate.getDate() + 1); 
            
            var bgColor = '#e2e3e5'; 
            var txtColor = '#383d41'; 
            
            if (evt.status === 'APPROVED') {
                bgColor = '#d1e7dd'; 
                txtColor = '#0f5132'; 
            } else if (evt.status === 'REJECTED') {
                bgColor = '#f8d7da'; 
                txtColor = '#842029'; 
            }
            
            return {
                title: evt.title,
                start: evt.start,
                end: eDate.toISOString().split('T')[0],
                allDay: true,
                backgroundColor: bgColor,
                textColor: txtColor,
                borderColor: bgColor,
                extendedProps: { status: evt.status }
            };
        });

        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            dayHeaderFormat: { weekday: 'long' }, // Forces full day names
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,multiMonthYear' 
            },
            events: formattedEvents,
            eventDidMount: function(info) {
                if (info.event.extendedProps.status === 'APPROVED') {
                    info.el.style.borderLeftColor = '#0f5132';
                } else if (info.event.extendedProps.status === 'REJECTED') {
                    info.el.style.borderLeftColor = '#842029';
                } else {
                    info.el.style.borderLeftColor = '#383d41';
                }
            },
            eventClick: function(info) {
                var cleanTitle = info.event.title.split(' (')[0];
                alert('Leave Type: ' + cleanTitle + '\nDate: ' + info.event.startStr);
            },
            height: 'auto', 
            contentHeight: 600
        });
        
        calendar.render();
    });
</script>
</body>
</html>
