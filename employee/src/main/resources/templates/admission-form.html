<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Admission - EAC System</title>
    <link rel="icon" type="image/png" th:href="@{/image/logo.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="standalone-body bg-gradient-vertical flex-center">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="form-container shadow-lg">
                <div class="text-center mb-5">
                    <img th:src="@{/image/logo.png}" class="logo-sm mx-auto d-block mb-3" alt="EAC Logo">
                    <h3 class="fw-bold text-dark mb-1" style="letter-spacing: -0.5px;">Employee Admission Form</h3>
                    <p class="text-muted small text-uppercase fw-bold letter-spacing-1">Emilio Aguinaldo College - Human Resources</p>
                    <div style="width: 40px; height: 3px; background-color: var(--eac-red); margin: 0 auto; border-radius: 2px;"></div>
                </div>

                <form th:action="@{/submit}" th:object="${applicant}" method="post">
                    
                    <div class="section-header shadow-sm">Personal Information</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-muted text-uppercase small letter-spacing-1 mb-1">First Name</label>
                            <input type="text" class="form-control" th:field="*{firstName}" placeholder="e.g. Juan">
                            <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted text-uppercase small letter-spacing-1 mb-1">Last Name</label>
                            <input type="text" class="form-control" th:field="*{lastName}" placeholder="e.g. Dela Cruz">
                            <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                        </div>
                    </div>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-muted text-uppercase small letter-spacing-1 mb-1">Email Address</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="juan.delacruz@eac.edu.ph">
                            <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted text-uppercase small letter-spacing-1 mb-1">Phone Number</label>
                            <input type="text" class="form-control" th:field="*{phone}" placeholder="09XX-XXX-XXXX">
                            <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                        </div>
                    </div>

                    <div class="section-header shadow-sm">Employment Details</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label text-muted text-uppercase small letter-spacing-1 mb-1">Gender</label>
                            <select class="form-select" th:field="*{gender}">
                                <option value="" disabled selected>Select...</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                            <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                        </div>
                        
                        <div class="col-md-8">
                            <label class="form-label text-muted text-uppercase small letter-spacing-1 mb-1">Applying For (Employment Type)</label>
                            <select class="form-select border-danger" th:field="*{employmentType}" id="employmentTypeSelect">
                                <option value="" disabled selected>Select Type...</option>
                                <option value="Full-Time Faculty">Full-Time Faculty</option>
                                <option value="Part-Time Faculty">Part-Time Faculty</option>
                                <option value="Full-Time Non-Faculty">Full-Time Non-Faculty</option>
                                <option value="Part-Time Non-Faculty">Part-Time Non-Faculty</option>
                            </select>
                            <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('employmentType')}" th:errors="*{employmentType}"></div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-danger fw-bold text-uppercase small letter-spacing-1 mb-1">Department / School</label>
                            <select class="form-select" th:field="*{department}" id="departmentDropdown" required>
                                <option value="" disabled selected>Please select Employment Type first...</option>
                            </select>
                            <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-muted text-uppercase small letter-spacing-1 mb-1">Specific Position</label>
                            <input type="text" class="form-control" th:field="*{positionApplied}" placeholder="e.g. Professor, Registrar Staff, etc." required>
                            <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('positionApplied')}" th:errors="*{positionApplied}"></div>
                        </div>
                    </div>

                    <div class="section-header shadow-sm">Professional Background</div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label text-muted text-uppercase small letter-spacing-1 mb-1">Years of Exp.</label>
                            <input type="number" class="form-control" th:field="*{yearsExperience}" min="0">
                            <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('yearsExperience')}" th:errors="*{yearsExperience}"></div>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label text-muted text-uppercase small letter-spacing-1 mb-1">Previous Employer</label>
                            <input type="text" class="form-control" th:field="*{previousEmployer}">
                            <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('previousEmployer')}" th:errors="*{previousEmployer}"></div>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted text-uppercase small letter-spacing-1 mb-1">Link to Resume / CV</label>
                        <input type="text" class="form-control" th:field="*{resumeLink}" placeholder="https://drive.google.com/...">
                        <div class="text-danger small mt-1 fw-bold" th:if="${#fields.hasErrors('resumeLink')}" th:errors="*{resumeLink}"></div>
                    </div>

                    <div class="mt-5">
                        <button type="submit" class="btn btn-danger w-100 py-3 shadow-sm" style="font-size: 1.1rem; letter-spacing: 1px;">Submit Official Application</button>
                        <a href="/" class="btn btn-link w-100 mt-3 text-decoration-none text-muted fw-bold text-center d-block text-uppercase letter-spacing-1" style="font-size: 0.8rem; transition: 0.2s;">Return to Home</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. The EAC School Lists
    const facultySchools = [
        "School of Arts and Sciences", "School of Business Education", "School of Criminology",
        "School of Engineering and Technology", "School of Hospitality and Tourism Management",
        "School of Midwifery & Caregiving", "School of Medicine", "School of Medical Technology",
        "School of Nutrition & Dietetics", "School of Nursing",
        "School of Physical, Occupational, and Respiratory Therapy", "School of Pharmacy"
    ];

    const nonFacultyDepts = [
        "IT Services", "Finance & Accounting", "Registrar & Admissions",
        "Facilities & Maintenance", "Human Resources", "Student Affairs", "General Administration"
    ];

    // 2. Grab the HTML Elements
    const typeSelect = document.getElementById('employmentTypeSelect');
    const deptDropdown = document.getElementById('departmentDropdown');

    // 3. The Update Function
    function updateDepartments() {
        const selectedType = typeSelect.value;
        
        // Clear current options
        deptDropdown.innerHTML = '<option value="" disabled selected>Select Department/School...</option>';

        let optionsToLoad = [];
        
        // Decide which list to load based on the word "Faculty"
        if (selectedType.includes('Faculty') && !selectedType.includes('Non-Faculty')) {
            optionsToLoad = facultySchools;
        } else if (selectedType.includes('Non-Faculty')) {
            optionsToLoad = nonFacultyDepts;
        }

        // Inject the options into the HTML
        optionsToLoad.forEach(dept => {
            const opt = document.createElement('option');
            opt.value = dept;
            opt.textContent = dept;
            deptDropdown.appendChild(opt);
        });
    }

    // 4. Listen for clicks!
    typeSelect.addEventListener('change', updateDepartments);
    
    // Run once on load just in case a value is already selected
    updateDepartments();
</script>

</body>
</html>
