<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Management Portal - EAC System</title>
    <link rel="icon" type="image/png" th:href="@{/image/logo.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css?v=3.1}">
    <style>
        /* Premium Animated Light Background (Same as Employee Portal) */
        body.gateway-admin-light {
            background: linear-gradient(-45deg, #ffffff, #f0f4f8, #fde8e8, #f4f7f6);
            background-size: 400% 400%;
            animation: gradientBGLight 15s ease infinite;
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
        }
        @keyframes gradientBGLight {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .eac-link { transition: transform 0.3s; text-decoration: none; display: inline-block; }
        .eac-link:hover { transform: scale(1.02); }
        
        /* Ensure the card layout matches perfectly */
        .gateway-card { 
            border-radius: 24px; 
            overflow: hidden; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0,0,0,0.02); 
            width: 100%; 
            max-width: 480px; 
            display: flex; 
            flex-direction: column;
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(20px);
            z-index: 10;
        }
    </style>
</head>
<body class="gateway-admin-light">

<div class="gateway-card shadow-lg" style="border-top: 5px solid var(--eac-dark);">
    
    <div class="text-center border-bottom pb-4 mb-4 pt-4 px-4">
        <a href="https://www.eac.edu.ph/" target="_blank" class="eac-link">
            <img th:src="@{/image/logo.png}" alt="EAC Logo" style="max-width: 80px; margin-bottom: 15px;">
            <h1 class="fw-bold mb-1 text-dark" style="letter-spacing: -1px; font-size: 1.8rem;">Management <span style="color: var(--eac-dark);">Portal</span></h1>
            <p class="fs-6 text-muted fw-bold text-uppercase mb-0" style="letter-spacing: 1px; font-size: 0.75rem !important;">Emilio Aguinaldo College</p>
        </a>
    </div>
    
    <div class="px-5 pb-5 pt-2">
        <div class="text-center mb-4">
            <h4 class="fw-bold text-dark mb-1" id="dynamicGreetingAdmin">Welcome</h4>
            <p class="text-muted small">Please sign in with your system credentials.</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger p-3 small fw-bold text-center border-0 shadow-sm" style="border-radius: 10px; background-color: #fde8e8; color: var(--eac-dark);">
            Invalid credentials. Please try again.
        </div>
        <div th:if="${param.logout}" class="alert alert-success p-3 small fw-bold text-center border-0 shadow-sm" style="border-radius: 10px;">
            You have been securely logged out.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold text-muted small text-uppercase" style="letter-spacing: 1px;">System ID</label>
                <input type="text" name="username" class="form-control bg-light" placeholder="admin, hr, or finance" required autofocus style="border: 1px solid transparent; padding: 12px 15px; border-radius: 8px;">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold text-muted small text-uppercase" style="letter-spacing: 1px;">Password</label>
                <input type="password" name="password" class="form-control bg-light" placeholder="••••••••" required style="border: 1px solid transparent; padding: 12px 15px; border-radius: 8px;">
            </div>
            
            <button type="submit" class="btn w-100 mt-2 shadow-sm text-white" style="background-color: var(--eac-dark); padding: 12px; border-radius: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Sign In to Dashboard</button>
        </form>
        
        <div class="text-center mt-4 pt-2">
            <a href="/" class="text-decoration-none text-muted small fw-bold text-uppercase" style="letter-spacing: 1px; transition: 0.2s;">&larr; Return to Home</a>
        </div>
    </div>
</div>

<script>
    // Smart Time-Based Greeting
    const hour = new Date().getHours();
    const greetingElement = document.getElementById('dynamicGreetingAdmin');
    if (hour < 12) greetingElement.innerText = "Good Morning.";
    else if (hour < 18) greetingElement.innerText = "Good Afternoon.";
    else greetingElement.innerText = "Good Evening.";
</script>

</body>
</html>
